<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định dạng văn bản trong HTLM</title>
</head>
<body align = "center">
    <h2>Bài thơ</h2>
    <p>Bài thơ đầu <strong>anh viết tặng cho em </strong> <br>
        Là bài thơ kể về <strong>đôi dép</strong> <br>
        Khi <strong>nỗi nhớ</strong> ở trong lòng da diết<br>
        Những vật <strong>tầm thường</strong> cũng viết thành thơ<br>
    </p>
    <p>
        Hai <strong>chiếc giép</strong> kia gặp gỡ tự bao giờ <br>
        Có yêu nhau mà <strong>chẳng rời</strong> nửa bước <br>
        Cùng <strong>gánh vác</strong> những nẻo đường xuôi ngược<br>
        Lên <strong>thảm nhung</strong>, xuống <strong>cát bụi</strong>, cùng nhau <br>
    </p>
</body>
</html>
