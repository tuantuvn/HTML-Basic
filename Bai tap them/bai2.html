<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách</title>
</head>
<body>
    <h2>Danh Sách Không Sắp Xếp (Unordered List):</h2>
    <ul> 
        <li>Mục 1</li>
        <li>Mục 2</li>
        <li>Mục 3</li>
        <li>Mục 4</li>
        <li>Mục 5</li>
    </ul>

    <h2>Danh Sách Có Sắp Xếp (Ordered List):</h2>
    <ol>
        <li>Mục A</li>
        <li>Mục B</li>
        <li>Mục C</li>
    </ol>
</body>
</html>
