<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Đơn Giản</title>
</head>
<body>
    <header>
        <h1>Tiêu đề trang web</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Trang chủ</a></li>
            <li><a href="#">Sản phẩm</a></li>
            <li><a href="#">Liên hệ</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Danh sách sản phẩm</h2>
            <ul>
                <li>Sản phẩm 1</li>
                <li>Sản phẩm 2</li>
                <li>Sản phẩm 3</li>
            </ul>
        </section>

        <section>
            <h2>Hình ảnh</h2>
            <img src="hinh-anh.jpg" alt="Hình ảnh mô tả">
        </section>

        <section>
            <h2>Bảng thông tin</h2>
            <table>
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sản phẩm A</td>
                        <td>100.000 VND</td>
                    </tr>
                    <tr>
                        <td>Sản phẩm B</td>
                        <td>150.000 VND</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section>
            <h2>Biểu mẫu liên hệ</h2>
            <form>
                <label for="ten">Tên:</label>
                <input type="text" id="ten" name="ten">
                <br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <br>

                <label for="tin-nhan">Tin nhắn:</label>
                <textarea id="tin-nhan" name="tin-nhan" rows="4"></textarea>
                <br>

                <input type="submit" value="Gửi">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Trang web của bạn</p>
    </footer>
</body>
</html>
